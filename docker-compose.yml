version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
      - ./dataset/spotify-tracks-dataset.csv:/opt/spark-apps/spotify-tracks-dataset.csv
      - ./warehouse:/opt/warehouse

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./spark:/opt/spark-apps
      - ./dataset/spotify-tracks-dataset.csv:/opt/spark-apps/spotify-tracks-dataset.csv
      - ./warehouse:/opt/warehouse

  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  hive-metastore:
    build:
      context: ./hive
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      - postgres
    ports:
      - "9083:9083"
    volumes:
      - ./spark:/opt/spark-apps
      - ./warehouse:/opt/warehouse
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_AUX_JARS_PATH: /opt/hive/lib/postgresql.jar
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive

  hive-server:
    build:
      context: ./hive
    container_name: hive-server
    hostname: hive-server
    depends_on:
      - hive-metastore
    ports:
      - "10000:10000"
    volumes:
      - ./spark:/opt/spark-apps
      - ./warehouse:/opt/warehouse
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "true"
      HIVE_AUX_JARS_PATH: /opt/hive/lib/postgresql.jar
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive

volumes:
  postgres_data: